<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Indian Dinner — 360 / AR</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
  :root{--accent:#e8843a;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:radial-gradient(circle at 50% 30%,#1c1a24,#0e0d12);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#f4f0ea}
  .wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:24px;gap:18px}
  h1{font-size:1.35rem;margin:0;font-weight:600}
  p.sub{margin:0;opacity:.6;font-size:.9rem;text-align:center;max-width:380px}
  model-viewer{width:min(92vw,560px);height:min(70vh,560px);background:transparent;--poster-color:transparent}
  .hint{opacity:.55;font-size:.82rem}
  .ar-btn{position:absolute;bottom:16px;right:16px;background:var(--accent);color:#1a1208;border:none;border-radius:999px;padding:12px 20px;font-weight:600;font-size:.95rem;box-shadow:0 6px 20px rgba(232,132,58,.4);cursor:pointer}
  .badge{display:inline-block;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);padding:4px 12px;border-radius:999px;font-size:.75rem;letter-spacing:.5px}
</style>
</head>
<body>
<div class="wrap">
  <span class="badge">360 - AR READY</span>
  <h1>Indian Dinner Plate</h1>
  <model-viewer
      src="meal.glb"
      ios-src="meal.glb"
      alt="Indian dinner plate"
      camera-controls auto-rotate auto-rotate-delay="600"
      rotation-per-second="22deg" interaction-prompt="auto"
      shadow-intensity="1" exposure="1.1"
      camera-orbit="0deg 55deg 1.6m"
      max-camera-orbit="auto 90deg auto"
      ar ar-modes="webxr scene-viewer quick-look" ar-scale="auto">
      <button slot="ar-button" class="ar-btn">View in AR</button>
  </model-viewer>
  <p class="sub">Drag to spin, pinch to zoom. Tap <b>View in AR</b> on your phone to place it on your real table.</p>
  <div class="hint">iPhone uses Quick Look - Android uses Scene Viewer</div>
</div>
</body>
</html>
